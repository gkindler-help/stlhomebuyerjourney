  <style>
    .aff-shell{
      width:100%;
      height:100%;
      display:flex;
      flex-direction:column;
      min-height:0;
      position:relative;
    }

    .aff-stage{
      flex:1;
      min-height:0;
      position:relative;
      overflow:hidden;
      background:var(--bg);
    }

    .scene-pane{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
    }

    .scene-caption{
      max-height:none;
      overflow:visible;
    }

    .context-pills{
      display:none;
      align-items:center;
      gap:6px;
      margin-left:auto;
      margin-right:8px;
    }

    .ctx-pill{
      border:1px solid var(--line-2);
      background:rgba(255,255,255,.03);
      color:var(--text-soft);
      border-radius:999px;
      padding:4px 10px;
      font-size:10px;
      font-weight:700;
      letter-spacing:.04em;
      cursor:pointer;
      transition:border-color .18s ease, color .18s ease, background .18s ease;
      white-space:nowrap;
    }

    .ctx-pill:hover{
      border-color:var(--gold-line);
      color:var(--text-strong);
      background:rgba(255,255,255,.05);
    }

    .custom-scene{
      position:absolute;
      inset:0;
      z-index:12;
      display:flex;
      flex-direction:column;
      justify-content:flex-end;
      padding:0;
    }

    .custom-overlay{
      position:absolute;
      inset:0;
      background:
        linear-gradient(
          to bottom,
          rgba(0,0,0,.48) 0%,
          rgba(0,0,0,.22) 22%,
          rgba(0,0,0,.18) 42%,
          rgba(0,0,0,.62) 72%,
          rgba(0,0,0,.92) 100%
        );
      z-index:0;
    }

    .custom-inner{
      position:relative;
      z-index:1;
      padding:0 0 16px;
    }

    .bubble-row{
      display:flex;
      align-items:flex-end;
      gap:0;
      padding:0 16px;
      margin-bottom:10px;
    }

    .bubble-face{
      width:74px;
      height:74px;
      flex-shrink:0;
      position:relative;
      margin-bottom:-4px;
    }

    .bubble-face img{
      width:100%;
      height:100%;
      object-fit:contain;
      object-position:bottom center;
    }

    .bubble-face .fb{
      position:absolute;
      inset:0;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      color:var(--text-faint);
      font-family:var(--font-serif);
      font-size:12px;
      z-index:-1;
    }

    .bubble-copy{
      flex:1;
      position:relative;
      background:rgba(12,12,12,.96);
      border:1px solid var(--line-2);
      border-radius:0 12px 12px 12px;
      padding:13px 14px;
      color:var(--text);
      font-size:14px;
      line-height:1.72;
      box-shadow:0 10px 30px rgba(0,0,0,.24);
    }

    .bubble-copy::before{
      content:"";
      position:absolute;
      left:-7px;
      top:11px;
      border:6px solid transparent;
      border-right-color:var(--line-2);
    }

    .bubble-copy::after{
      content:"";
      position:absolute;
      left:-5px;
      top:12px;
      border:5px solid transparent;
      border-right-color:rgba(12,12,12,.96);
    }

    .input-card{
      margin:0 16px;
      background:rgba(10,10,10,.97);
      border:1px solid var(--line-2);
      border-radius:16px;
      padding:16px;
      box-shadow:0 18px 40px rgba(0,0,0,.28);
    }

    .field-label{
      display:block;
      margin-bottom:8px;
      color:var(--text-dim);
      font-size:10px;
      font-weight:700;
      letter-spacing:.1em;
      text-transform:uppercase;
    }

    .big-input{
      width:100%;
      background:rgba(255,255,255,.03);
      border:1px solid var(--line-2);
      border-radius:12px;
      color:var(--gold);
      text-align:center;
      padding:16px 18px;
      font-family:var(--font-serif);
      font-size:34px;
      font-weight:700;
      outline:none;
      appearance:textfield;
    }

    .big-input:focus{
      border-color:var(--gold-line);
    }

    .big-input::-webkit-outer-spin-button,
    .big-input::-webkit-inner-spin-button{
      -webkit-appearance:none;
      margin:0;
    }

    .field-note{
      margin-top:8px;
      color:var(--text-dim);
      font-size:11px;
      line-height:1.6;
      text-align:center;
    }

    .tile-grid{
      display:grid;
      gap:10px;
      margin:0 16px;
    }

    .loan-grid{
      grid-template-columns:repeat(3, minmax(0,1fr));
    }

    .area-grid{
      grid-template-columns:repeat(2, minmax(0,1fr));
    }

    .select-tile{
      background:rgba(12,12,12,.96);
      border:1px solid var(--line-2);
      border-radius:14px;
      padding:14px 12px;
      cursor:pointer;
      transition:border-color .18s ease, background .18s ease, transform .12s ease;
      min-height:94px;
    }

    .select-tile:hover{
      border-color:var(--gold-line);
      background:rgba(255,255,255,.03);
    }

    .select-tile:active{
      transform:scale(.985);
    }

    .select-tile.active{
      border-color:var(--gold-line);
      background:var(--gold-soft);
    }

    .select-title{
      color:var(--text-strong);
      font-family:var(--font-serif);
      font-size:16px;
      font-weight:600;
      line-height:1.25;
      margin-bottom:4px;
    }

    .select-tile.active .select-title{
      color:var(--gold);
    }

    .select-sub{
      color:var(--text-dim);
      font-size:10px;
      line-height:1.45;
    }

    .select-meta{
      color:var(--text-faint);
      font-size:10px;
      line-height:1.45;
      margin-top:5px;
    }

    .select-tile.wide{
      grid-column:1 / -1;
    }

    .analysis-card{
      margin:0 16px 12px;
      background:rgba(10,10,10,.97);
      border:1px solid var(--line-2);
      border-radius:18px;
      padding:18px 16px;
      box-shadow:0 18px 40px rgba(0,0,0,.28);
    }

    .analysis-kicker{
      color:var(--text-dim);
      font-size:10px;
      font-weight:700;
      letter-spacing:.12em;
      text-transform:uppercase;
      margin-bottom:8px;
    }

    .analysis-title{
      color:var(--text-strong);
      font-family:var(--font-serif);
      font-size:26px;
      font-weight:700;
      line-height:1.12;
      margin-bottom:10px;
      letter-spacing:-.02em;
    }

    .analysis-title span{
      color:var(--gold);
    }

    .analysis-copy{
      color:var(--text);
      font-size:14px;
      line-height:1.76;
    }

    .analysis-copy strong{
      color:var(--text-strong);
      font-weight:700;
    }

    .summary-strip{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:8px;
      margin:0 16px 12px;
    }

    .summary-pill{
      background:rgba(255,255,255,.03);
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px;
    }

    .summary-pill-label{
      color:var(--text-faint);
      font-size:9px;
      font-weight:700;
      letter-spacing:.1em;
      text-transform:uppercase;
      margin-bottom:5px;
    }

    .summary-pill-value{
      color:var(--text-soft);
      font-size:12px;
      line-height:1.4;
    }

    .summary-pill-value.gold{
      color:var(--gold);
      font-weight:700;
    }

    .link-card{
      margin-top:12px;
      display:block;
      width:100%;
      border:1px solid var(--line);
      background:rgba(255,255,255,.025);
      border-radius:12px;
      padding:12px 13px;
      color:var(--text-soft);
      font-size:12px;
      line-height:1.6;
      text-align:left;
      cursor:pointer;
      transition:border-color .18s ease, background .18s ease, color .18s ease;
    }

    .link-card:hover{
      border-color:var(--gold-line);
      background:rgba(255,255,255,.04);
      color:var(--text-strong);
    }

    .result-caption .scene-caption{
      padding-left:156px;
    }

    .result-caption .george-float{
      width:146px;
    }

    @media (max-width:430px){
      .loan-grid{
        grid-template-columns:1fr;
      }

      .area-grid{
        grid-template-columns:1fr;
      }

      .analysis-title{
        font-size:23px;
      }

      .result-caption .scene-caption{
        padding-left:140px;
      }

      .result-caption .george-float{
        width:132px;
      }
    }
  </style>
</head>

  <script>
    (function () {
      "use strict";

      var STORAGE_KEY = "stl_journey_v1";
      var CURRENT_CHAPTER = 2;

      var state = loadState();
      var currentStep = clampStep(state.lastChapter === CURRENT_CHAPTER ? state.lastStep : 0);
      var interruptDismissed = false;
      var interruptTimer = null;

      var AREA_OPTIONS = [
        {
          id: "south-county",
          name: "South County",
          zips: "63123 · 63125 · 63126 · 63128",
          median: 265000,
          desc: "Affton, Mehlville, Crestwood, Oakville"
        },
        {
          id: "south-city",
          name: "South City",
          zips: "63109 · 63116",
          median: 208000,
          desc: "Tower Grove, Bevo, Patch, Fox Park"
        },
        {
          id: "webster-kirkwood",
          name: "Webster / Kirkwood",
          zips: "63119 · 63122",
          median: 435000,
          desc: "Webster Groves, Kirkwood"
        },
        {
          id: "jefferson",
          name: "Jefferson County",
          zips: "63010 · 63049 · 63052 · 63028",
          median: 308000,
          desc: "Arnold, High Ridge, Imperial, Festus"
        },
        {
          id: "north-county",
          name: "North County",
          zips: "63031 · 63033",
          median: 200000,
          desc: "Florissant, Hazelwood"
        },
        {
          id: "st-charles",
          name: "St. Charles County",
          zips: "63301 · 63366 · 63376 · 63385",
          median: 349000,
          desc: "St. Charles, O’Fallon, St. Peters, Wentzville"
        },
        {
          id: "west-county",
          name: "West County",
          zips: "63043",
          median: 295000,
          desc: "Maryland Heights, Chesterfield edges"
        }
      ];

      var LOAN_OPTIONS = [
        {
          id: "conventional",
          name: "Conventional",
          sub: "Most flexible in older housing stock"
        },
        {
          id: "fha",
          name: "FHA",
          sub: "More condition rules at appraisal"
        },
        {
          id: "va",
          name: "VA",
          sub: "Safe, sound, sanitary standards"
        }
      ];

      var STEP_COUNT = 7;

      var STEP_META = [
        { room: "Your Number", bg: "https://images.unsplash.com/photo-1568605114967-8130f3a36994?w=900&q=85" },
        { room: "Loan Type", bg: "https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=900&q=85" },
        { room: "Where You Want to Live", bg: "https://images.unsplash.com/photo-1568605114967-8130f3a36994?w=900&q=85" },
        { room: "Reading the Market", bg: "https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=900&q=85" },
        { room: "What This Gets You", bg: "https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=900&q=85" },
        { room: "Your Range", bg: "https://images.unsplash.com/photo-1493809842364-78817add7ffb?w=900&q=85" },
        { room: "George’s Process", bg: "https://images.unsplash.com/photo-1568605114967-8130f3a36994?w=900&q=85" }
      ];

      function loadState() {
        try {
          return Object.assign(
            {
              amount: 280000,
              loan: "conventional",
              zip: "63123",
              area: "",
              lastChapter: 1,
              lastStep: 0,
              chaptersVisited: [],
              lessons: [],
              jumpEntry: null
            },
            JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}")
          );
        } catch (error) {
          return {
            amount: 280000,
            loan: "conventional",
            zip: "63123",
            area: "",
            lastChapter: 1,
            lastStep: 0,
            chaptersVisited: [],
            lessons: [],
            jumpEntry: null
          };
        }
      }

      function saveState() {
        state.lastChapter = CURRENT_CHAPTER;
        state.lastStep = currentStep;
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        } catch (error) {}
      }

      function track(name, payload) {
        if (typeof window.gtag === "function") {
          window.gtag("event", name, payload || {});
        }
      }

      function byId(id) {
        return document.getElementById(id);
      }

      function clampStep(value) {
        if (typeof value !== "number" || isNaN(value)) {
          return 0;
        }
        return Math.max(0, Math.min(STEP_COUNT - 1, value));
      }

      function formatMoney(value) {
        return "$" + Number(value || 0).toLocaleString("en-US");
      }

      function getArea() {
        return AREA_OPTIONS.find(function (area) {
          return area.id === state.area;
        }) || null;
      }

      function getTier() {
        var area = getArea();
        if (!area) {
          return "mid";
        }
        var ratio = Number(state.amount || 0) / area.median;
        if (ratio < 0.95) {
          return "tight";
        }
        if (ratio <= 1.2) {
          return "mid";
        }
        return "strong";
      }

      function getTierLabel() {
        var tier = getTier();
        if (tier === "tight") return "Below the center of the zip";
        if (tier === "mid") return "Middle of the market";
        return "Top of the zip";
      }

      function getTierIntro() {
        var tier = getTier();
        var area = getArea();
        var areaName = area ? area.name : "this area";

        if (tier === "tight") {
          return {
            title: "You are shopping the lower part of <span>" + areaName + "</span>.",
            copy: "That does <strong>not</strong> mean impossible. It means older housing stock, more condition tradeoffs, and more importance placed on <strong>loan fit</strong> and <strong>property condition</strong>."
          };
        }

        if (tier === "mid") {
          return {
            title: "You are in the <span>most competitive</span> band of " + areaName + ".",
            copy: "This is where most buyers land: homes that are livable, sometimes dated, sometimes partially updated, and usually moving fast when the layout and location make sense."
          };
        }

        return {
          title: "You are near the <span>top of the zip</span> in " + areaName + ".",
          copy: "That gives you more options, but it changes what matters. At this level, bad renovations, permit history, floor plan compromises, and over-improvement become more important than paint color."
        };
      }

      function getDetailContent() {
        var tier = getTier();
        var area = getArea();

        if (!area) {
          return {
            title: "First, the number in context.",
            copy: "The goal is not approval. The goal is matching your approval to the part of the market you are actually entering."
          };
        }

        if (tier === "tight") {
          return {
            title: "Your money reaches the older end of " + area.name + ".",
            copy: "Think brick homes with age, deferred maintenance, older windows, older panels, and mechanicals that matter more than cosmetics. In this band, <strong>condition can kill financing</strong> if we do not screen well up front."
          };
        }

        if (tier === "mid") {
          return {
            title: "Your approval fits the core resale market in " + area.name + ".",
            copy: "This is the sweet spot for most owner-occupant buyers: solid neighborhoods, mixed updates, and plenty of homes where <strong>layout, systems, and timeline</strong> matter more than granite counters."
          };
        }

        return {
          title: "Your approval reaches the top tier of " + area.name + ".",
          copy: "You gain choices, but the mistakes get more expensive. Here I shift attention to <strong>permits, quality of renovation, floor plan</strong>, and whether the price is actually justified by the bones under the finish work."
        };
      }

      function getRangeScene() {
        var tier = getTier();

        if (tier === "tight") {
          return {
            room: "Lower Range Homes",
            bg: "https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=900&q=85",
            george: "serious",
            title: "Pre-1970 stock. Brick construction. Original bones.",
            sub: "Here’s what you’ll find — and what to watch for.",
            interrupt: {
              title: "Conforming guidelines are real here.",
              text: "FHA and VA have minimum property condition requirements. Missing handrails, peeling paint on pre-1978 homes, non-functional systems, and safety issues get flagged fast. I screen for this before you lose time on the wrong house."
            },
            choices: [
              {
                label: "What does lower range actually look like?",
                response: "Usually older stock with stronger bones than the price suggests, but a lot more history. Brick construction is common. Original windows, dated electrical, older HVAC, and moisture clues matter much more than fresh paint.",
                deep: {
                  title: "The upside of lower range",
                  body: "The upside is equity. Lower entry price plus the right improvements can create meaningful value, but only if the systems, structure, and financing path make sense before you get emotionally attached."
                }
              },
              {
                label: "What if I am open to a fixer?",
                response: "That can work. I just want you falling in love with the right fixer, not one your loan cannot close on or one that needs a level of work the price never justified."
              },
              {
                label: "What do you check before a showing?",
                response: "Listing photos, seller’s disclosure, days on market, price history, visible condition red flags, likely appraisal issues, and whether the house fits your loan type before we ever set the appointment."
              }
            ]
          };
        }

        if (tier === "mid") {
          return {
            room: "Mid Range Homes",
            bg: "https://images.unsplash.com/photo-1493809842364-78817add7ffb?w=900&q=85",
            george: "serious",
            title: "This is where most buyers land. And most competition.",
            sub: "Here’s why — and what you’ll actually find.",
            interrupt: {
              title: "Most competition is right here.",
              text: "Move-in ready enough plus good location plus reasonable price is the busiest part of the market. The edge is not speed alone. The edge is knowing what matters before the right house appears."
            },
            choices: [
              {
                label: "What does mid-range actually look like?",
                response: "Usually 1960s to 1990s construction with mixed updates. Some parts feel move-in ready, while baths, windows, or mechanicals may still be behind. This range rewards buyers who can separate style from systems.",
                deep: {
                  title: "What I watch for here",
                  body: "HVAC age, roof condition, panel brand, basement moisture, window condition, sewer concerns, and whether the seller did the right updates or only the visible ones."
                }
              },
              {
                label: "What is the two-of-three rule?",
                response: "In this range, buyers usually get two of three: condition, location, or square footage. Knowing which two matter most before you walk in keeps you from chasing a fantasy and overpaying for it."
              },
              {
                label: "How fast do homes move here?",
                response: "The best ones often move in the first weekend. That is exactly why I want your approval, target area, and non-negotiables settled before we start showing anything."
              }
            ]
          };
        }

        return {
          room: "Top of the Zip",
          bg: "https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=900&q=85",
          george: "serious",
          title: "More options. Different things to watch for.",
          sub: "At the top of any zip code, the game changes.",
          interrupt: {
            title: "Beautiful finishes hide things too.",
            text: "A higher price tag does not mean a cleaner house. It often means better staging and better lighting. I still look at permits, workmanship, systems, and layout before I believe the finish work."
          },
          choices: [
            {
              label: "What does renovated actually mean?",
              response: "Sometimes real improvement. Sometimes lipstick over deferred maintenance. The more polished the house looks, the more I want to know what was done behind the walls and whether it was done correctly.",
              deep: {
                title: "Bad workmanship still costs real money",
                body: "Unpermitted electrical, poorly vented baths, rushed finish work, cosmetic-only flips, and mechanical systems left old under a pretty shell are all more common than buyers expect."
              }
            },
            {
              label: "Why do permits matter more here?",
              response: "Because expensive mistakes transfer with the deed. At this price point, unpermitted additions and low-quality updates can represent a much larger dollar problem."
            },
            {
              label: "What is the real constraint at this level?",
              response: "Floor plan. You can update a kitchen. You cannot cheaply fix a bad flow, a poor addition, or a layout that never worked. High-end finishes do not solve design problems."
            }
          ]
        };
      }

      function getWrapScene() {
        return {
          room: "George’s Process",
          bg: "https://images.unsplash.com/photo-1568605114967-8130f3a36994?w=900&q=85",
          george: "proud",
          title: "Now you know how I think about affordability.",
          sub: "Not just the number — the number in context of area, loan type, condition, and competition.",
          choices: [
            {
              label: "What happens at the showing?",
              response: "That is Chapter 3. We walk through a house the way I do: what costs money, what changes your leverage, and what most buyers never notice until it becomes their problem."
            },
            {
              label: "Can I call about my situation?",
              response: "Yes. That is exactly what the call is for. 314.435.1087. No pressure. Buyer education is my favorite part of the job."
            },
            {
              label: "Show me the zip code map tool",
              response: "Use the Budget Matchmaker to compare what your approval reaches by zip code across the St. Louis side of MLS coverage.",
              deep: {
                title: "STL Budget Matchmaker",
                body: "It is the faster way to see how your approval behaves across different areas before you start booking tours."
              }
            }
          ]
        };
      }

      function setBackground(url) {
        var image = byId("bg-img");
        var svgWrap = byId("scene-svg-wrap");
        if (!image) return;

        image.style.display = "block";
        image.style.opacity = "0";
        image.onload = function () {
          image.style.transition = "opacity .55s ease";
          image.style.opacity = "1";
        };
        image.onerror = function () {
          image.style.display = "none";
          if (svgWrap) {
            svgWrap.style.display = "flex";
          }
        };
        image.src = url || "";
      }

      function setGeorge(faceName) {
        var map = {
          serious: "assets/george-serious.png",
          welcome: "assets/george-welcome.png",
          excited: "assets/george-excited.png",
          proud: "assets/george-proud.png",
          papers: "assets/george-papers.png",
          disappointed: "assets/george-disappointed.png"
        };
        var src = map[faceName] || map.serious;
        byId("george-img").src = src;
        byId("int-george-img").src = src;
      }

      function setProgress() {
        byId("prog").style.width = Math.round((currentStep / (STEP_COUNT - 1)) * 100) + "%";
      }

      function setHeaderPills() {
        var wrapper = byId("context-pills");
        var amount = byId("pill-amount");
        var area = byId("pill-area");
        if (!wrapper || !amount || !area) return;

        if (currentStep < 1) {
          wrapper.style.display = "none";
          return;
        }

        wrapper.style.display = "flex";
        amount.textContent = (state.amount ? "$" + Math.round(state.amount / 1000) + "K" : "Amount") + " ✎";

        if (currentStep >= 3 && getArea()) {
          area.style.display = "";
          area.textContent = getArea().name + " ✎";
        } else {
          area.style.display = "none";
        }
      }

      function saveAndTrackScene(room) {
        saveState();
        track("scene_view", {
          chapter: CURRENT_CHAPTER,
          scene: currentStep,
          room: room || ""
        });
      }

      function resetDynamicUI() {
        closeDrawer();
        dismissInterrupt(true);
        byId("custom-scene-root").innerHTML = "";
        byId("scene-caption").style.display = "";
        byId("george-float").style.display = "";
        byId("ask-george").style.display = "none";
        byId("ask-george").classList.remove("show");
      }

      function renderStep() {
        resetDynamicUI();
        setProgress();
        setHeaderPills();

        var meta = STEP_META[currentStep];
        byId("scene-lbl").textContent = meta.room;
        setBackground(meta.bg);

        if (currentStep === 0) return renderAmountStep();
        if (currentStep === 1) return renderLoanStep();
        if (currentStep === 2) return renderAreaStep();
        if (currentStep === 3) return renderAnalysisStep();
        if (currentStep === 4) return renderDetailStep();
        if (currentStep === 5) return renderRangeStep();
        return renderWrapStep();
      }

      function renderAmountStep() {
        setGeorge("serious");
        byId("scene-caption").style.display = "none";
        byId("george-float").style.display = "none";
        byId("btn-back").disabled = false;
        byId("btn-next").disabled = !Number(state.amount);
        byId("btn-next").classList.remove("gold");
        byId("btn-next").textContent = "Next →";

        var root = byId("custom-scene-root");
        root.innerHTML =
          '<div class="custom-scene">' +
            '<div class="custom-overlay"></div>' +
            '<div class="custom-inner">' +
              '<div class="bubble-row">' +
                '<div class="bubble-face">' +
                  '<img src="assets/george-serious.png" alt="George Kindler">' +
                  '<div class="fb">GK</div>' +
                '</div>' +
                '<div class="bubble-copy">Your lender gave you a number. Before we look at a single house, I need you to understand what that number actually means in this market.</div>' +
              '</div>' +
              '<div class="input-card">' +
                '<label class="field-label" for="amount-input">Pre-approval amount</label>' +
                '<input class="big-input" id="amount-input" type="number" inputmode="numeric" min="0" value="' + (state.amount || "") + '">' +
                '<div class="field-note">I will never tell you to max it out. Approval and comfort are not the same thing.</div>' +
              '</div>' +
            '</div>' +
          '</div>';

        var input = byId("amount-input");
        input.addEventListener("input", function () {
          state.amount = Number(input.value || 0);
          saveState();
          setHeaderPills();
          byId("btn-next").disabled = !Number(state.amount);
        });

        saveAndTrackScene("Your Number");
      }

      function renderLoanStep() {
        setGeorge("serious");
        byId("scene-caption").style.display = "none";
        byId("george-float").style.display = "none";
        byId("btn-back").disabled = false;
        byId("btn-next").disabled = !state.loan;
        byId("btn-next").classList.remove("gold");
        byId("btn-next").textContent = "Next →";

        var tiles = LOAN_OPTIONS.map(function (loan) {
          return (
            '<button class="select-tile ' + (state.loan === loan.id ? "active" : "") + '" data-loan="' + loan.id + '" type="button">' +
              '<div class="select-title">' + loan.name + '</div>' +
              '<div class="select-sub">' + loan.sub + '</div>' +
            '</button>'
          );
        }).join("");

        byId("custom-scene-root").innerHTML =
          '<div class="custom-scene">' +
            '<div class="custom-overlay"></div>' +
            '<div class="custom-inner">' +
              '<div class="bubble-row">' +
                '<div class="bubble-face">' +
                  '<img src="assets/george-serious.png" alt="George Kindler">' +
                  '<div class="fb">GK</div>' +
                '</div>' +
                '<div class="bubble-copy">What loan type are you working with? This changes what we can look at, what the appraiser will flag, and how sellers read your offer.</div>' +
              '</div>' +
              '<div class="tile-grid loan-grid">' + tiles + '</div>' +
            '</div>' +
          '</div>';

        Array.prototype.forEach.call(document.querySelectorAll("[data-loan]"), function (button) {
          button.addEventListener("click", function () {
            state.loan = button.getAttribute("data-loan");
            saveState();
            renderLoanStep();
          });
        });

        saveAndTrackScene("Loan Type");
      }

      function renderAreaStep() {
        setGeorge("serious");
        byId("scene-caption").style.display = "none";
        byId("george-float").style.display = "none";
        byId("btn-back").disabled = false;
        byId("btn-next").disabled = !state.area;
        byId("btn-next").classList.remove("gold");
        byId("btn-next").textContent = "Next →";

        var areaTiles = AREA_OPTIONS.map(function (area) {
          return (
            '<button class="select-tile ' + (state.area === area.id ? "active" : "") + '" data-area="' + area.id + '" type="button">' +
              '<div class="select-title">' + area.name + '</div>' +
              '<div class="select-sub">' + area.zips + '</div>' +
              '<div class="select-meta">Median around ' + formatMoney(area.median) + '</div>' +
            '</button>'
          );
        }).join("");

        byId("custom-scene-root").innerHTML =
          '<div class="custom-scene">' +
            '<div class="custom-overlay"></div>' +
            '<div class="custom-inner">' +
              '<div class="bubble-row">' +
                '<div class="bubble-face">' +
                  '<img src="assets/george-serious.png" alt="George Kindler">' +
                  '<div class="fb">GK</div>' +
                '</div>' +
                '<div class="bubble-copy">OK — what areas were you expecting to live in? Pick the one that feels closest to what you had in mind.</div>' +
              '</div>' +
              '<div class="tile-grid area-grid">' +
                areaTiles +
                '<button class="select-tile wide ' + (state.area === "not-listed" ? "active" : "") + '" data-area="not-listed" type="button">' +
                  '<div class="select-title">Not listed / not sure yet</div>' +
                  '<div class="select-sub">That is okay. We can still frame the market correctly.</div>' +
                '</button>' +
              '</div>' +
            '</div>' +
          '</div>';

        Array.prototype.forEach.call(document.querySelectorAll("[data-area]"), function (button) {
          button.addEventListener("click", function () {
            state.area = button.getAttribute("data-area");
            saveState();
            renderAreaStep();
          });
        });

        saveAndTrackScene("Where You Want to Live");
      }

      function renderAnalysisStep() {
        setGeorge("serious");
        byId("scene-caption").style.display = "none";
        byId("george-float").style.display = "none";
        byId("btn-back").disabled = false;
        byId("btn-next").disabled = false;
        byId("btn-next").classList.remove("gold");
        byId("btn-next").textContent = "Next →";

        var area = getArea();
        var areaLabel = area ? area.name : "a broader search area";
        var intro = getTierIntro();

        byId("custom-scene-root").innerHTML =
          '<div class="custom-scene">' +
            '<div class="custom-overlay"></div>' +
            '<div class="custom-inner">' +
              '<div class="summary-strip">' +
                '<div class="summary-pill">' +
                  '<div class="summary-pill-label">Approval</div>' +
                  '<div class="summary-pill-value gold">' + formatMoney(state.amount) + '</div>' +
                '</div>' +
                '<div class="summary-pill">' +
                  '<div class="summary-pill-label">Loan</div>' +
                  '<div class="summary-pill-value">' + prettyLoan(state.loan) + '</div>' +
                '</div>' +
                '<div class="summary-pill">' +
                  '<div class="summary-pill-label">Area</div>' +
                  '<div class="summary-pill-value">' + areaLabel + '</div>' +
                '</div>' +
              '</div>' +
              '<div class="analysis-card">' +
                '<div class="analysis-kicker">Reading the market</div>' +
                '<div class="analysis-title">' + intro.title + '</div>' +
                '<div class="analysis-copy">' + intro.copy + '</div>' +
              '</div>' +
            '</div>' +
          '</div>';

        saveAndTrackScene("Reading the Market");
      }

      function renderDetailStep() {
        setGeorge("serious");
        byId("scene-caption").style.display = "none";
        byId("george-float").style.display = "none";
        byId("btn-back").disabled = false;
        byId("btn-next").disabled = false;
        byId("btn-next").classList.remove("gold");
        byId("btn-next").textContent = "Next →";

        var detail = getDetailContent();
        var area = getArea();

        byId("custom-scene-root").innerHTML =
          '<div class="custom-scene">' +
            '<div class="custom-overlay"></div>' +
            '<div class="custom-inner">' +
              '<div class="analysis-card">' +
                '<div class="analysis-kicker">What this gets you</div>' +
                '<div class="analysis-title">' + detail.title + '</div>' +
                '<div class="analysis-copy">' + detail.copy + '</div>' +
                (area ? '<button class="link-card" id="zip-tool-btn" type="button">See how this behaves across more zip codes →</button>' : "") +
              '</div>' +
            '</div>' +
          '</div>';

        var zipToolBtn = byId("zip-tool-btn");
        if (zipToolBtn) {
          zipToolBtn.addEventListener("click", function () {
            window.open("https://gkindler-help.github.io/buyeraffordabilityheatmap/", "_blank", "noopener");
          });
        }

        saveAndTrackScene("What This Gets You");
      }

      function renderRangeStep() {
        var scene = getRangeScene();
        setGeorge(scene.george);
        setBackground(scene.bg);

        byId("sc-room").textContent = scene.room;
        byId("sc-title").textContent = scene.title;
        byId("sc-sub").textContent = scene.sub;
        byId("scene-caption").style.display = "";
        byId("george-float").style.display = "";
        byId("btn-back").disabled = false;
        byId("btn-next").disabled = false;
        byId("btn-next").classList.remove("gold");
        byId("btn-next").textContent = "Next →";

        buildChoices(scene.choices);
        if (scene.interrupt) {
          interruptDismissed = false;
          interruptTimer = window.setTimeout(function () {
            if (!interruptDismissed) {
              showInterrupt(scene.interrupt);
            }
          }, 900);
        } else {
          window.setTimeout(openDrawer, 500);
        }

        byId("ask-george").style.display = "none";
        saveAndTrackScene(scene.room);
      }

      function renderWrapStep() {
        var scene = getWrapScene();
        setGeorge(scene.george);
        setBackground(scene.bg);

        byId("sc-room").textContent = scene.room;
        byId("sc-title").textContent = scene.title;
        byId("sc-sub").textContent = scene.sub;
        byId("scene-caption").style.display = "";
        byId("george-float").style.display = "";
        byId("btn-back").disabled = false;
        byId("btn-next").disabled = false;
        byId("btn-next").classList.add("gold");
        byId("btn-next").textContent = "The Interior →";

        buildChoices(scene.choices);
        window.setTimeout(openDrawer, 500);

        saveAndTrackScene(scene.room);
      }

      function prettyLoan(loan) {
        if (loan === "fha") return "FHA";
        if (loan === "va") return "VA";
        return "Conventional";
      }

      function buildChoices(choices) {
        var container = byId("choices");
        container.innerHTML = "";
        byId("drawer-label").textContent = "Ask me anything";

        choices.forEach(function (choice, index) {
          var deepButton = "";
          if (choice.deep) {
            deepButton =
              '<button class="card-deep" type="button" data-deep-index="' + index + '">ⓘ ' +
              choice.deep.title +
              " →</button>";
          }

          var card = document.createElement("div");
          card.className = "choice-card";
          card.id = "card-" + index;
          card.innerHTML =
            '<button class="choice-card-header" type="button" data-choice-index="' + index + '">' +
              "<span>" + choice.label + "</span>" +
              '<span class="card-chevron">▼</span>' +
            "</button>" +
            '<div class="choice-card-body">' +
              '<div class="choice-card-response">' +
                choice.response +
                deepButton +
              "</div>" +
            "</div>";

          container.appendChild(card);
        });

        Array.prototype.forEach.call(document.querySelectorAll("[data-choice-index]"), function (button) {
          button.addEventListener("click", function () {
            var idx = Number(button.getAttribute("data-choice-index"));
            toggleCard(idx, choices.length);
          });
        });

        Array.prototype.forEach.call(document.querySelectorAll("[data-deep-index]"), function (button) {
          button.addEventListener("click", function (event) {
            event.stopPropagation();
            var idx = Number(button.getAttribute("data-deep-index"));
            var deep = choices[idx].deep;
            showDeep(deep.title, deep.body);
          });
        });
      }

      function toggleCard(idx, total) {
        for (var i = 0; i < total; i += 1) {
          var card = byId("card-" + i);
          if (!card) continue;
          if (i === idx) {
            card.classList.toggle("open");
          } else {
            card.classList.remove("open");
          }
        }
      }

      function openDrawer() {
        byId("drawer").classList.add("open");
      }

      function closeDrawer() {
        byId("drawer").classList.remove("open");
      }

      function typeText(text, element) {
        element.innerHTML = "";
        var index = 0;
        var timer = window.setInterval(function () {
          element.innerHTML = String(text || "").slice(0, index);
          index += 1;
          if (index > String(text || "").length) {
            window.clearInterval(timer);
          }
        }, 12);
      }

      function showInterrupt(interrupt) {
        byId("int-title").textContent = interrupt.title || "";
        typeText(interrupt.text || "", byId("int-text"));
        byId("int-dim").classList.add("active");
        byId("int-card").classList.add("active");
        closeDrawer();
      }

      function dismissInterrupt(silent) {
        if (interruptTimer) {
          window.clearTimeout(interruptTimer);
          interruptTimer = null;
        }
        interruptDismissed = true;
        byId("int-dim").classList.remove("active");
        byId("int-card").classList.remove("active");

        if (!silent && currentStep === 5) {
          window.setTimeout(function () {
            openDrawer();
            var ask = byId("ask-george");
            ask.style.display = "block";
            ask.classList.add("show");
          }, 250);
        }
      }

      function showDeep(title, body) {
        byId("pop-title").textContent = title || "";
        byId("pop-body").textContent = body || "";

        var pop = byId("pop");
        var sheet = byId("pop-sh");
        pop.style.display = "flex";

        window.requestAnimationFrame(function () {
          pop.style.opacity = "1";
          pop.style.pointerEvents = "all";
          sheet.classList.add("open");
        });
      }

      function closePop() {
        var pop = byId("pop");
        var sheet = byId("pop-sh");
        pop.style.opacity = "0";
        pop.style.pointerEvents = "none";
        sheet.classList.remove("open");

        window.setTimeout(function () {
          pop.style.display = "none";
        }, 250);
      }

      function nextStep() {
        if (currentStep === 0 && !Number(state.amount)) return;
        if (currentStep === 1 && !state.loan) return;
        if (currentStep === 2 && !state.area) return;

        if (currentStep === STEP_COUNT - 1) {
          if (!Array.isArray(state.chaptersVisited)) {
            state.chaptersVisited = [];
          }
          if (state.chaptersVisited.indexOf(CURRENT_CHAPTER) === -1) {
            state.chaptersVisited.push(CURRENT_CHAPTER);
          }
          state.lastChapter = 3;
          state.lastStep = 0;
          saveState();
          window.location.href = "03-interior.html";
          return;
        }

        currentStep += 1;
        renderStep();
      }

      function prevStep() {
        if (currentStep === 0) {
          window.location.href = "index.html";
          return;
        }
        currentStep -= 1;
        renderStep();
      }

      function bindEvents() {
        byId("btn-next").addEventListener("click", nextStep);
        byId("btn-back").addEventListener("click", prevStep);
        byId("int-btn").addEventListener("click", function () {
          dismissInterrupt(false);
        });
        byId("ask-george").addEventListener("click", function () {
          if (currentStep === 5) {
            dismissInterrupt(false);
          }
        });
        byId("pop-close").addEventListener("click", closePop);
        byId("pill-amount").addEventListener("click", function () {
          currentStep = 0;
          renderStep();
        });
        byId("pill-area").addEventListener("click", function () {
          currentStep = 2;
          renderStep();
        });

        document.addEventListener("keydown", function (event) {
          if (event.key === "Escape") {
            closePop();
            dismissInterrupt(true);
          }
        });
      }

      bindEvents();
      renderStep();
    })();
  </script>
</body>
</html>
