     deep:{title:'The frozen period',body:'From acceptance to keys: no car, no new accounts, no job changes, no large undocumented deposits, no co-signing. Not because it\'s probably fine. Because underwriters review your file multiple times — including 24\u201348 hours before closing.'}

     deep:{title:'Why even a promotion can kill your loan',body:'Lenders verify employment and income multiple times — at application, at conditional approval, and again 24\u201348 hours before closing. If you changed jobs between those pulls, even to a higher-paying position, underwriters may require 30 days of pay stubs from the new employer before they will close. That can blow a closing date entirely. If a job change is on the horizon, tell your lender before you accept the offer — not after you are under contract.'}

    }

// 1 — APPRAISAL
{

  drawerLabel:'What happens on the appraisal?',

    {label:'Can I challenge a low appraisal?',
     response:'Yes — through a Reconsideration of Value. You submit comparable sales the appraiser missed. It succeeds occasionally. I help when the comps support it. The timeline is tight.',

    },
    {label:'What if the appraisal is late?',
     response:'The appraisal contingency is waived if not delivered by the loan contingency date. This is why I push lenders to order the appraisal within 3 days of acceptance. Delays compound.',

     deep:{title:'Common title issues in St. Louis',body:'Pre-1960 homes sometimes carry unreleased old mortgages, mechanic\'s liens from past work, property tax delinquencies, or estate issues where heirs were not properly cleared. Title insurance protects you after closing — the commitment review protects you before. I read every commitment before closing.'}
    },
    {label:'Title problem — seller must cure',

    },
    {label:'Owner\'s title insurance — that\'s for you',
     response:'Owner\'s title insurance protects you, the buyer. Most sellers in our market will not pay for it — it\'s typically a buyer expense. In some cases we can negotiate it as a seller credit.',
     deep:{title:'Why you want owner\'s title insurance',body:'Lender\'s title insurance only protects the bank. Owner\'s title insurance protects you for as long as you own the property. If a claim surfaces after closing — a prior lien, a forged deed, an heir who wasn\'t disclosed — owner\'s title covers your defense and loss. It is a one-time premium. Do not waive it.'}
