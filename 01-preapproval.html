<style>
/* ═══════════════════════════════════════════════════════════
   CHAPTER 1 ONLY — Zillow simulator styles
   Everything below is unique to this chapter.
   shared.css owns all global tokens and shell styles.
═══════════════════════════════════════════════════════════ */

/* ── ZILLOW BRAND TOKENS ── */
:root {
  --zillow:       #006AFF;
  --zillow-dark:  #0052CC;
  --zillow-light: #EBF3FF;
  --zillow-text:  #1a202c;
  --zillow-sub:   #4a5568;
  --z-border:     #dde3ed;
  --z-card:       #ffffff;
  --z-bg:         #f7f9fc;
}

/* ── ZILLOW SCENE WRAPPER ──
   Overlays the stage for light-background Zillow scenes.
   Fades out as the chapter transitions to dark shell. */
.z-scene {
  position: absolute;
  inset: 0;
  z-index: 20;
  background: var(--z-bg);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0 0 16px;
  transition: opacity .5s ease;
}
.z-scene::-webkit-scrollbar { display: none; }
.z-scene.fading { opacity: 0; pointer-events: none; }

/* ── ZILLOW APP TOP BAR ── */
.z-topbar {
  background: var(--zillow);
  padding: 10px 16px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.z-logo {
  font-family: var(--font-sans);
  font-size: 20px;
  font-weight: 800;
  color: white;
  letter-spacing: -.02em;
}
.z-logo span { color: rgba(255,255,255,.6); font-weight: 400; font-size: 11px; margin-left: 4px; letter-spacing: .04em; }
.z-nav-icon {
  width: 28px;
  height: 28px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  justify-content: center;
  cursor: pointer;
}
.z-nav-icon span {
  display: block;
  height: 2px;
  background: white;
  border-radius: 2px;
}

/* ── NOTIFICATION SCREEN ── */
.z-notif-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 20px;
  gap: 20px;
}
.z-phone-frame {
  width: 100%;
  max-width: 300px;
  background: #1c1c1e;
  border-radius: 28px;
  padding: 20px 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,.35);
}
.z-phone-status {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: rgba(255,255,255,.7);
  margin-bottom: 16px;
  padding: 0 4px;
}
.z-notif-card {
  background: rgba(255,255,255,.12);
  backdrop-filter: blur(10px);
  border-radius: 14px;
  padding: 12px 14px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.z-notif-icon {
  width: 36px;
  height: 36px;
  background: var(--zillow);
  border-radius: 8px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}
.z-notif-body { flex: 1; min-width: 0; }
.z-notif-app {
  font-size: 10px;
  font-weight: 700;
  color: rgba(255,255,255,.5);
  letter-spacing: .06em;
  text-transform: uppercase;
  margin-bottom: 2px;
}
.z-notif-title {
  font-size: 13px;
  font-weight: 600;
  color: white;
  line-height: 1.3;
  margin-bottom: 2px;
}
.z-notif-sub {
  font-size: 11px;
  color: rgba(255,255,255,.6);
  line-height: 1.4;
}
.z-notif-time {
  font-size: 10px;
  color: rgba(255,255,255,.4);
  flex-shrink: 0;
}
.z-notif-cta {
  margin-top: 14px;
  text-align: center;
  font-size: 11px;
  color: rgba(255,255,255,.4);
  font-family: var(--font-sans);
}
.z-scene-label {
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--zillow-sub);
  text-align: center;
}
.z-scene-text {
  font-family: var(--font-sans);
  font-size: 14px;
  color: var(--zillow-text);
  text-align: center;
  line-height: 1.65;
}
.z-scene-text strong { color: var(--zillow); }

/* ── ZILLOW LISTING CARD ── */
.z-listing-wrap {
  padding: 16px;
  flex: 1;
}
.z-listing-card {
  background: var(--z-card);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,.1);
  border: 1px solid var(--z-border);
}
.z-listing-img {
  height: 180px;
  background: linear-gradient(135deg, #c8d6e8, #a8bcd4);
  position: relative;
  overflow: hidden;
}
.z-listing-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.z-listing-badge {
  position: absolute;
  top: 10px;
  left: 10px;
  background: var(--zillow);
  color: white;
  font-family: var(--font-sans);
  font-size: 10px;
  font-weight: 800;
  letter-spacing: .06em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 4px;
}
.z-listing-save {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 32px;
  height: 32px;
  background: rgba(255,255,255,.9);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}
.z-listing-body { padding: 16px; }
.z-listing-price {
  font-family: var(--font-sans);
  font-size: 24px;
  font-weight: 800;
  color: var(--zillow-text);
  margin-bottom: 4px;
}
.z-listing-addr {
  font-family: var(--font-sans);
  font-size: 13px;
  color: var(--zillow-sub);
  margin-bottom: 10px;
  line-height: 1.4;
}
.z-listing-stats {
  display: flex;
  gap: 16px;
  font-family: var(--font-sans);
  font-size: 12px;
  color: var(--zillow-sub);
  margin-bottom: 14px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--z-border);
}
.z-listing-stats span { display: flex; align-items: center; gap: 4px; }
.z-listing-desc {
  font-family: var(--font-sans);
  font-size: 12px;
  color: var(--zillow-sub);
  line-height: 1.6;
  margin-bottom: 14px;
}
.z-contact-btn {
  width: 100%;
  padding: 13px;
  background: var(--zillow);
  border: none;
  border-radius: 6px;
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 700;
  color: white;
  cursor: pointer;
  transition: background .15s, transform .12s;
  -webkit-appearance: none;
}
.z-contact-btn:active { transform: scale(.98); background: var(--zillow-dark); }
.z-contact-btn.tapped {
  background: #059669;
}
.z-disclaimer {
  font-family: var(--font-sans);
  font-size: 10px;
  color: #a0aec0;
  text-align: center;
  margin-top: 8px;
  line-height: 1.5;
}
.z-agent-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 0 0;
  border-top: 1px solid var(--z-border);
  margin-top: 14px;
}
.z-agent-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--zillow-light);
  border: 2px solid var(--zillow);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.z-agent-info { flex: 1; min-width: 0; }
.z-agent-name {
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 700;
  color: var(--zillow-text);
}
.z-agent-tag {
  font-family: var(--font-sans);
  font-size: 10px;
  color: var(--zillow);
  font-weight: 600;
}
.z-premier-badge {
  background: var(--zillow-light);
  color: var(--zillow);
  font-family: var(--font-sans);
  font-size: 9px;
  font-weight: 800;
  letter-spacing: .06em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 10px;
  flex-shrink: 0;
}

/* ── SMS SCREEN ── */
.z-sms-screen {
  background: var(--z-bg);
  flex: 1;
  display: flex;
  flex-direction: column;
}
.z-sms-topbar {
  background: var(--z-card);
  border-bottom: 1px solid var(--z-border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.z-sms-back {
  font-size: 22px;
  color: var(--zillow);
  cursor: pointer;
  line-height: 1;
}
.z-sms-contact { flex: 1; text-align: center; }
.z-sms-name {
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 700;
  color: var(--zillow-text);
}
.z-sms-status {
  font-family: var(--font-sans);
  font-size: 10px;
  color: #a0aec0;
}
.z-sms-body {
  flex: 1;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  overflow-y: auto;
}
.z-sms-time {
  font-family: var(--font-sans);
  font-size: 10px;
  color: #a0aec0;
  text-align: center;
  margin: 6px 0 2px;
  letter-spacing: .04em;
  text-transform: uppercase;
}
.z-sms-recv {
  align-self: flex-start;
  max-width: 80%;
  background: #e5e5ea;
  color: var(--zillow-text);
  font-family: var(--font-sans);
  font-size: 13px;
  line-height: 1.55;
  padding: 9px 12px;
  border-radius: 18px 18px 18px 4px;
}
.z-sms-sent {
  align-self: flex-end;
  max-width: 80%;
  background: var(--zillow);
  color: white;
  font-family: var(--font-sans);
  font-size: 13px;
  line-height: 1.55;
  padding: 9px 12px;
  border-radius: 18px 18px 4px 18px;
}
.z-sms-replies {
  padding: 12px 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex-shrink: 0;
  background: var(--z-bg);
}
.z-sms-reply {
  width: 100%;
  padding: 12px 16px;
  background: var(--z-card);
  border: 1.5px solid var(--zillow);
  border-radius: 22px;
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 600;
  color: var(--zillow);
  cursor: pointer;
  text-align: center;
  transition: background .15s, color .15s;
}
.z-sms-reply:active { background: var(--zillow); color: white; }
.z-sms-reply.selected { background: var(--zillow); color: white; pointer-events: none; }

/* ── REVEAL CARD (dark border, gold accent) ── */
.z-reveal {
  margin: 12px 16px 0;
  background: rgba(0,0,0,.04);
  border: 1px solid var(--gold-line);
  border-left: 3px solid var(--gold);
  border-radius: 10px;
  padding: 13px 14px;
  flex-shrink: 0;
}
.z-reveal-title {
  font-family: var(--font-sans);
  font-size: 10px;
  font-weight: 800;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 6px;
}
.z-reveal-body {
  font-family: var(--font-sans);
  font-size: 13px;
  color: var(--zillow-text);
  line-height: 1.65;
}
.z-reveal-body strong { color: #1a202c; }

/* Dark variant for reveal cards that appear after transition */
.z-reveal.dark {
  background: rgba(255,204,77,.06);
  border-color: var(--gold-line);
}
.z-reveal.dark .z-reveal-body { color: var(--text-soft); }
.z-reveal.dark .z-reveal-body strong { color: var(--text-strong); }

/* ── FRIEND SMS (appears in George scene) ── */
.friend-sms {
  margin: 0 16px;
  background: var(--z-card);
  border: 1px solid var(--z-border);
  border-radius: 14px;
  overflow: hidden;
  flex-shrink: 0;
}
.friend-sms-top {
  background: var(--z-bg);
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--z-border);
}
.friend-sms-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, #a78bfa, #7c3aed);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.friend-sms-name {
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 700;
  color: var(--zillow-text);
}
.friend-sms-body {
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.friend-bubble {
  align-self: flex-start;
  max-width: 90%;
  background: #e5e5ea;
  color: var(--zillow-text);
  font-family: var(--font-sans);
  font-size: 13px;
  line-height: 1.55;
  padding: 9px 12px;
  border-radius: 18px 18px 18px 4px;
}
.friend-bubble strong { color: #1a202c; }
.friend-bubble a {
  color: var(--zillow);
  font-weight: 700;
  text-decoration: none;
}

/* ── GEORGE BREAK-IN ROW ── */
.g-break-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 14px 16px 0;
  flex-shrink: 0;
}
.g-break-face {
  width: 52px;
  height: 52px;
  flex-shrink: 0;
  border-radius: 50%;
  overflow: hidden;
  border: 2px solid var(--gold-line);
  background: var(--surface-2);
}
.g-break-face img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
}
.g-break-bubble {
  flex: 1;
  background: var(--surface-2);
  border: 1px solid var(--line-2);
  border-radius: 0 12px 12px 12px;
  padding: 11px 13px;
  font-family: var(--font-sans);
  font-size: 13px;
  color: var(--text-soft);
  line-height: 1.65;
  position: relative;
}
.g-break-bubble::before {
  content: '';
  position: absolute;
  left: -7px;
  top: 10px;
  border: 6px solid transparent;
  border-right-color: var(--line-2);
}
.g-break-bubble::after {
  content: '';
  position: absolute;
  left: -5px;
  top: 11px;
  border: 5px solid transparent;
  border-right-color: var(--surface-2);
}
.g-break-bubble strong { color: var(--text-strong); }

/* ── TRANSITION OVERLAY ──
   Dark vignette that covers z-scene during handoff to shell */
.z-transition {
  position: absolute;
  inset: 0;
  z-index: 25;
  background: var(--bg);
  opacity: 0;
  pointer-events: none;
  transition: opacity .6s ease;
}
.z-transition.show { opacity: 1; }

/* Spacer used inside z-scene scroll areas */
.z-spacer { height: 16px; flex-shrink: 0; }

/* ── MOBILE TUNING ── */
@media (max-width: 430px) {
  .z-listing-img { height: 150px; }
  .z-listing-price { font-size: 20px; }
  .z-phone-frame { max-width: 260px; }
}
</style>

<script>
// ════════════════════════════════════════════
//  ZILLOW SCENE RENDERER
//  Handles scenes 0–5 (light Zillow UI)

// ════════════════════════════════════════════

var _zReplied    = false;
var _zContactTapped = false;

function renderZillowScene(sc, idx) {
  var stage = document.getElementById('stage');
  if (!stage) return;

  // Remove existing z-scene and transition
  var existing = document.getElementById('z-scene-el');
  if (existing) existing.remove();
  var existingT = document.getElementById('z-trans-el');
  if (existingT) existingT.remove();

  // Update progress and scene label via shared.js helpers
  var prog = document.getElementById('prog');
  var lbl  = document.getElementById('scene-lbl');
  if (prog) prog.style.width = Math.round((idx / (window.SCENES.length - 1)) * 100) + '%';
  if (lbl)  lbl.textContent  = sc.room;

  // Nav
  var btnBack = document.getElementById('btn-back');
  var btnNext = document.getElementById('btn-next');
  if (btnBack) btnBack.disabled = (idx === 0);
  if (btnNext) { btnNext.textContent = 'Next \u2192'; btnNext.classList.remove('gold'); btnNext.disabled = false; }

  // Hide normal scene layers
  var gbg  = document.getElementById('scene-bg');
  var gcap = document.getElementById('scene-caption');
  var gflt = document.getElementById('george-float');
  if (gbg)  gbg.style.opacity  = '0';
  if (gcap) gcap.style.opacity = '0';
  if (gflt) gflt.classList.add('hidden');
  if (window.SharedPlatform) { SharedPlatform.closeDrawer(); SharedPlatform.dismissInterrupt(true); }

  // Build z-scene wrapper
  var el = document.createElement('div');
  el.id = 'z-scene-el';
  el.className = 'z-scene';
  el.innerHTML = buildZillowHTML(sc, idx);
  stage.appendChild(el);

  // Wire interactive elements
  wireZillowEvents(el, idx);

  // Save state
  var SK = 'stl_journey_v1';
  try { var s = JSON.parse(localStorage.getItem(SK)||'{}'); s.lastStep = idx; s.lastChapter = 1; localStorage.setItem(SK, JSON.stringify(s)); } catch(e) {}
  if (typeof gtag === 'function') gtag('event', 'scene_view', { chapter: 1, scene: idx, room: sc.room });
}

    case 3: // THE REVEAL
      return `

          <div class="z-reveal-body">Alex works for Zillow &mdash; not for you. Chris <strong>paid Zillow for your contact information.</strong> The Zillow Premier Agent program routes you to whoever paid the most for your zip code this month.</div>
        </div>
        <div class="z-spacer"></div>`;

    case 4: // CHRIS TEXTS
      return `
        <div class="z-sms-screen" style="flex:none;">
          <div class="z-sms-topbar">
            <div class="z-sms-back">&#8249;</div>
            <div class="z-sms-contact">
              <div class="z-sms-name">Chris &bull; Zillow Agent</div>
              <div class="z-sms-status">Mobile</div>
            </div>
            <div style="width:28px;"></div>
          </div>
          <div class="z-sms-body" style="flex:none;padding:16px;">
            <div class="z-sms-time">Today 9:15 AM</div>

          </div>
        </div>
        <div class="z-reveal">

        </div>

    case 5: // GEORGE BREAKS IN
      return `

}

function wireZillowEvents(el, idx) {
  // Scene 1: Contact Agent button
  var contactBtn = el.querySelector('#z-contact-btn');
  if (contactBtn) {
    contactBtn.addEventListener('click', function() {
      if (_zContactTapped) return;
      _zContactTapped = true;
      contactBtn.textContent = '&#10003; Request Sent';
      contactBtn.classList.add('tapped');
      if (typeof gtag === 'function') gtag('event', 'zillow_contact_tap', { chapter: 1 });
      // Auto-advance after brief pause
      setTimeout(function() { advanceScene(); }, 900);
    });
  }

  // Scene 2: SMS reply buttons
  var repSee = el.querySelector('#z-rep-see');
  var repOwn = el.querySelector('#z-rep-own');
  function handleReply(btn) {
    if (_zReplied) return;
    _zReplied = true;
    btn.classList.add('selected');
    if (repSee) repSee.style.pointerEvents = 'none';
    if (repOwn) repOwn.style.pointerEvents = 'none';
    if (typeof gtag === 'function') gtag('event', 'zillow_sms_reply', { reply: btn.id, chapter: 1 });
    setTimeout(function() { advanceScene(); }, 600);
  }
  if (repSee) repSee.addEventListener('click', function() { handleReply(repSee); });
  if (repOwn) repOwn.addEventListener('click', function() { handleReply(repOwn); });
}

// ════════════════════════════════════════════
//  NAVIGATION
// ════════════════════════════════════════════
var _cur = 0;

function advanceScene() {
  _cur++;
  dispatchScene(_cur);
}

function dispatchScene(idx) {
  var scenes = window.SCENES;
  if (!scenes || idx >= scenes.length) return;

  var sc = scenes[idx];
  _cur = idx;

  // Scenes 0-5: Zillow UI
  if (idx <= 5) {
    renderZillowScene(sc, idx);
    return;
  }

  // Scene 5→6 transition: fade out z-scene, reveal dark shell
  if (idx === 6) {
    var zEl = document.getElementById('z-scene-el');
    if (zEl) {
      zEl.classList.add('fading');
      setTimeout(function() {
        if (zEl.parentNode) zEl.parentNode.removeChild(zEl);
        showDarkShell(sc, idx);
      }, 500);
    } else {
      showDarkShell(sc, idx);
    }
    return;
  }

  // Scenes 7+: standard shared.js renderScene
  if (window.SharedPlatform && typeof window.SharedPlatform.renderScene === 'function') {
    var gbg  = document.getElementById('scene-bg');
    var gcap = document.getElementById('scene-caption');
    var gflt = document.getElementById('george-float');
    if (gbg)  gbg.style.opacity  = '1';
    if (gcap) gcap.style.opacity = '1';
    if (gflt) gflt.classList.remove('hidden');
    window.SharedPlatform.renderScene(idx);
  }
}

function showDarkShell(sc, idx) {
  // Restore normal scene layers
  var gbg  = document.getElementById('scene-bg');
  var gcap = document.getElementById('scene-caption');
  var gflt = document.getElementById('george-float');
  if (gbg)  { gbg.style.opacity = '1'; }
  if (gcap) { gcap.style.opacity = '1'; }
  if (gflt) { gflt.classList.remove('hidden'); }
  if (window.SharedPlatform && typeof window.SharedPlatform.renderScene === 'function') {
    window.SharedPlatform.renderScene(idx);
  }
}

// Override shared.js next/prev to route through our dispatcher
function ch1Next() {
  var scenes = window.SCENES;
  var sc = scenes[_cur];
  if (!sc) return;

  if (sc.isLast) {
    var SK = 'stl_journey_v1';
    try {
      var s = JSON.parse(localStorage.getItem(SK)||'{}');
      if (!s.chaptersVisited) s.chaptersVisited = [];
      if (!s.chaptersVisited.includes(1)) s.chaptersVisited.push(1);
      s.lastChapter = sc.nextChapter || 2;
      s.lastStep = 0;
      localStorage.setItem(SK, JSON.stringify(s));
    } catch(e) {}
    window.location.href = sc.nextFile || '02-affordability.html';
    return;
  }

  // Scenes 2 (SMS): require interaction
  if (_cur === 2 && !_zReplied) return;
  // Scene 1 (listing): require contact tap
  if (_cur === 1 && !_zContactTapped) {
    // Nudge the button
    var btn = document.getElementById('z-contact-btn');
    if (btn) { btn.style.animation = 'none'; btn.style.border = '2px solid #ff0'; setTimeout(function(){ btn.style.border=''; }, 600); }
    return;
  }

  _cur++;
  dispatchScene(_cur);
}

function ch1Prev() {
  if (_cur > 0) {
    _cur--;
    // Reset interaction flags when going back
    if (_cur <= 1) _zContactTapped = false;
    if (_cur <= 2) _zReplied = false;
    dispatchScene(_cur);
  } else {
    window.location.href = 'index.html';
  }
}

// ════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════
function ch1Init() {
  if (!document.getElementById('prog')) {
    setTimeout(ch1Init, 20);
    return;
  }

  // Restore last step
  var SK = 'stl_journey_v1';
  try {
    var s = JSON.parse(localStorage.getItem(SK)||'{}');
    if (s.lastChapter === 1 && s.lastStep > 0) {
      _cur = Math.min(s.lastStep, window.SCENES.length - 1);
    }
  } catch(e) {}

  // Wire nav buttons
  var btnBack = document.getElementById('btn-back');
  var btnNext = document.getElementById('btn-next');
  if (btnBack) btnBack.onclick = ch1Prev;
  if (btnNext) btnNext.onclick = ch1Next;

  // Wire int-btn
  var intBtn = document.getElementById('int-btn');
  if (intBtn) intBtn.onclick = function() {
    if (window.SharedPlatform) SharedPlatform.dismissInterrupt(false);
  };

  // Start
  dispatchScene(_cur);
}
</script>

<script src="shared.js"></script>

<script>
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', ch1Init);
} else {
  ch1Init();
}
</script>
